<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courbes de réponse — Utility AI</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0f0ec;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
    --green: #639922; --orange: #D85A30; --purple: #7F77DD;
    --blue: #378ADD; --red: #E24B4A; --amber: #EF9F27;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
      --text: #e5e5e5; --text2: #aaa; --text3: #777;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 1.5rem; max-width: 720px; margin: 0 auto; line-height: 1.6; }
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border2); margin-bottom: 1.5rem; }
  .tab-btn { background: none; border: none; padding: 10px 18px; font-size: 14px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; font-family: var(--font); transition: all 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }
  .tab-panel { display: none; } .tab-panel.active { display: block; }
  .card { background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; padding: 1.25rem; margin-bottom: 16px; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .card-desc { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
  .curve-row { display: flex; gap: 16px; align-items: flex-start; }
  .curve-canvas-wrap { flex: 0 0 200px; height: 200px; }
  .curve-controls { flex: 1; min-width: 0; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
